name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Compile and build server shim
        run: ./gradlew.bat compileJava forgeServerShimJar --stacktrace

      - name: Upload Forge server shim
        uses: actions/upload-artifact@v4
        with:
          name: forge-server-shim
          path: build/libs/*forge-server-shim*.jar
          if-no-files-found: error
